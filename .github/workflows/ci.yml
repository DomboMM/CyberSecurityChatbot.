name: C# CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-lastest

    steps:
      - name:checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'

      - name: Build
        run: dotnet build